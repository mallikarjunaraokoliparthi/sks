<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKS M M — Ledger</title>
<style>
  :root, body.dark{
    --bg:#0f1420;
    --card-bg:#171e2e;
    --card-bg2:#1c2438;
    --card-bg2-hover:#212b44;
    --ink:#e8ecf4;
    --muted:#8b93a7;
    --line:rgba(255,255,255,0.08);
    --green:#34d399;
    --green-bg:rgba(52,211,153,0.14);
    --orange:#fb923c;
    --orange-bg:rgba(251,146,60,0.14);
    --amber:#fbbf24;
    --amber-bg:rgba(251,191,36,0.14);
    --accent:#818cf8;
    --body-grad:linear-gradient(160deg,#0c1018 0%,#131a2a 60%,#101828 100%);
    --card-shadow:0 20px 60px rgba(0,0,0,0.45);
    --nodata:#4a5266;
    --title-grad:linear-gradient(90deg,#e8ecf4,#a5b4fc);
    --btn-ink:#fff;
  }
  body.light{
    --bg:#f4f5f9;
    --card-bg:#ffffff;
    --card-bg2:#f2f4fa;
    --card-bg2-hover:#e8ebf5;
    --ink:#1c2333;
    --muted:#6b7385;
    --line:rgba(20,30,60,0.10);
    --green:#0e9f6e;
    --green-bg:rgba(14,159,110,0.12);
    --orange:#dd6b20;
    --orange-bg:rgba(221,107,32,0.12);
    --amber:#b7791f;
    --amber-bg:rgba(183,121,31,0.14);
    --accent:#5a67d8;
    --body-grad:linear-gradient(160deg,#eef1f8 0%,#f6f7fb 60%,#eef2f9 100%);
    --card-shadow:0 12px 40px rgba(30,40,80,0.12);
    --nodata:#b7bcc9;
    --title-grad:linear-gradient(90deg,#1c2333,#5a67d8);
    --btn-ink:#fff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--body-grad);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:20px 12px;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:500px;
    background:var(--card-bg);
    border-radius:24px;
    padding:22px;
    box-shadow:var(--card-shadow);
  }

  /* Import bar */
  .import-bar{
    display:flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(135deg,rgba(129,140,248,0.22),rgba(52,211,153,0.12));
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:18px;
    cursor:pointer;
    transition:transform .15s;
  }
  .import-bar:active{ transform:scale(0.98); }
  .import-icon{ font-size:24px; }
  .import-text{ flex:1; }
  .import-title{ font-size:16px; font-weight:800; }
  .import-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .import-btn{
    background:var(--accent);
    color:var(--btn-ink);
    font-size:14px;
    font-weight:800;
    border:none;
    border-radius:12px;
    padding:10px 16px;
    cursor:pointer;
  }
  #fileInput{ display:none; }

  .header{
    text-align:center;
    margin-bottom:20px;
    padding:18px 14px;
    background:linear-gradient(135deg,rgba(129,140,248,0.18),rgba(52,211,153,0.10));
    border-radius:18px;
  }
  .header .eyebrow{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:700;
  }
  .header h1{
    margin:6px 0 0;
    font-size:26px;
    font-weight:800;
    background:var(--title-grad);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .section-title{
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--muted);
    margin:24px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .legend{
    display:flex;
    gap:16px;
    justify-content:center;
    margin-top:14px;
    font-size:14px;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .legend span{ display:flex; align-items:center; gap:5px; }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot.green{ background:var(--green); box-shadow:0 0 8px rgba(52,211,153,0.6); }
  .dot.orange{ background:var(--orange); box-shadow:0 0 8px rgba(251,146,60,0.6); }
  .dot.amber{ background:var(--amber); box-shadow:0 0 8px rgba(251,191,36,0.6); }

  /* Flat history widgets */
  .flat-history{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  .fh-card{
    background:var(--card-bg2);
    border-radius:14px;
    padding:13px 14px;
    cursor:pointer;
    transition:background .2s, transform .15s;
  }
  .fh-card:hover{ background:var(--card-bg2-hover); }
  .fh-card:active{ transform:scale(0.98); }
  .fh-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:16px;
    font-weight:800;
  }
  .fh-header .fh-tag{
    font-size:11px;
    font-weight:800;
    padding:3px 9px;
    border-radius:20px;
    letter-spacing:0.3px;
    white-space:nowrap;
  }
  .fh-tag.paid{ background:var(--green-bg); color:var(--green); }
  .fh-tag.due{ background:var(--amber-bg); color:var(--amber); }
  .fh-tag.notpaid{ background:var(--orange-bg); color:var(--orange); }
  .fh-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    padding:7px 0 0;
    margin-top:7px;
  }
  .fh-row .fh-month{ color:var(--muted); font-weight:700; width:42px; }
  .fh-row .fh-vals{ display:flex; gap:9px; flex-wrap:wrap; justify-content:flex-end; }
  .fh-row .fh-vals span{ display:flex; align-items:center; gap:2px; }
  .fh-row .fh-vals .yes{ color:var(--green); font-weight:700; }
  .fh-row .fh-vals .no{ color:var(--orange); font-weight:700; }
  .fh-row .fh-vals .part{ color:var(--amber); font-weight:700; }
  .fh-row.nodata .fh-month{ color:var(--nodata); }
  .fh-row.nodata .fh-vals span{ color:var(--nodata); font-weight:400; }
  .fh-card .fh-row.hidden-month{ display:none; }
  .fh-card.expanded .fh-row.hidden-month{ display:flex; }
  .fh-chevron{
    font-size:12px;
    color:var(--accent);
    margin-left:5px;
    transition:transform .25s;
  }
  .fh-card.expanded .fh-chevron{ transform:rotate(180deg); }

  /* Expenses */
  .expenses{ display:flex; flex-direction:column; gap:10px; }
  .expense-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card-bg2);
    border-radius:14px;
    padding:13px 15px;
  }
  .expense-icon{
    width:42px; height:42px;
    border-radius:12px;
    background:rgba(129,140,248,0.12);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .expense-info{ flex:1; }
  .expense-name{ font-size:16px; font-weight:600; }
  .bar-track{
    height:7px;
    background:rgba(255,255,255,0.06);
    border-radius:4px;
    margin-top:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg,#fb923c,#f472b6);
    border-radius:4px;
  }
  .expense-amt{
    font-size:16px; font-weight:800;
    white-space:nowrap; min-width:70px; text-align:right;
  }

  /* Month cards */
  .month-cards{ display:flex; gap:10px; flex-wrap:wrap; }
  .month-card{
    flex:1;
    min-width:calc(50% - 5px);
    background:var(--card-bg2);
    border-radius:14px;
    padding:15px 15px;
  }
  .month-card .month-name{
    font-size:16px; font-weight:800;
    margin-bottom:9px;
    color:var(--accent);
    text-align:center;
  }
  .month-card .row{
    display:flex; justify-content:space-between;
    font-size:14px; margin-top:5px;
  }
  .month-card .row .lbl{ color:var(--muted); }
  .month-card .row.sub{ padding-left:9px; }
  .month-card .row.sub .lbl{ font-size:13px; }
  .month-card .row.sub.inc-sub .val{ font-size:13px; color:var(--green); font-weight:600; }
  .month-card .row.sub.exp-sub .val{ font-size:13px; color:var(--orange); font-weight:600; }
  .month-card .row.inc .val{ color:var(--green); font-weight:700; }
  .month-card .row.exp .val{ color:var(--orange); font-weight:700; }
  .month-card .row.net .val{ color:var(--ink); font-weight:800; }
  .month-card .row.net{ border-top:1px dashed var(--line); margin-top:7px; padding-top:7px; }

  .month-total{
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(135deg,rgba(129,140,248,0.14),rgba(52,211,153,0.09));
    border-radius:12px;
    padding:12px 16px;
    margin-top:10px;
    font-size:14px;
  }
  .month-total .lbl{ color:var(--muted); font-weight:700; }
  .month-total .vals{ display:flex; gap:13px; }
  .month-total .vals span{ font-weight:800; }
  .month-total .vals .inc{ color:var(--green); }
  .month-total .vals .exp{ color:var(--orange); }
  .month-total .vals .net{ color:var(--ink); }

  .summary{
    display:flex; justify-content:space-between;
    margin-top:22px; padding:17px 10px;
    background:var(--card-bg2);
    border-radius:16px;
  }
  .summary .item{ text-align:center; flex:1; }
  .summary .label{ font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-weight:700; }
  .summary .value{ font-size:21px; font-weight:800; margin-top:4px; }
  .summary .income .value{ color:var(--green); }
  .summary .expense .value{ color:var(--orange); }
  .summary .net .value{ background:linear-gradient(90deg,#a5b4fc,#34d399); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  .top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
  }
  .theme-toggle{
    background:var(--card-bg2);
    color:var(--ink);
    border:none;
    border-radius:20px;
    padding:8px 16px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:transform .15s;
  }
  .theme-toggle:active{ transform:scale(0.95); }

  .empty-note{ text-align:center; color:var(--muted); font-size:14px; padding:10px; }
</style>
</head>
<body class="dark">
<div class="card">
  <div class="top-bar"><button class="theme-toggle" id="themeToggle">☀️ Light</button></div>

  <label class="import-bar" for="fileInput">
    <span class="import-icon">📂</span>
    <span class="import-text">
      <span class="import-title">Import CSV</span>
      <div class="import-sub" id="importStatus">Budget CSV upload cheyandi — anni sections auto-update avtayi</div>
    </span>
    <span class="import-btn">Upload</span>
  </label>
  <input type="file" id="fileInput" accept=".csv,.txt,text/csv,text/plain,text/comma-separated-values,application/csv,application/vnd.ms-excel,*/*">

  <div class="header">
    <div class="eyebrow">SKS M M · Society Ledger</div>
    <h1 id="dateRange">—</h1>
  </div>

  <div class="section-title">Flat-wise Monthly History</div>
  <div class="flat-history" id="flatHistory"></div>
  <div class="legend" id="flatLegend"></div>

  <div class="section-title">Expenses</div>
  <div class="expenses" id="expensesList"></div>

  <div class="section-title">Month-wise Summary</div>
  <div class="month-cards" id="monthCards"></div>
  <div class="month-total" id="monthTotal" style="display:none"></div>

  <div class="summary">
    <div class="item income">
      <div class="label">Income</div>
      <div class="value" id="totIncome">—</div>
    </div>
    <div class="item expense">
      <div class="label">Expense</div>
      <div class="value" id="totExpense">—</div>
    </div>
    <div class="item net">
      <div class="label">Net</div>
      <div class="value" id="totNet">—</div>
    </div>
  </div>
</div>

<script>
// ---------- Known flats (new flats from CSV are auto-added) ----------
const KNOWN_FLATS = ["401","402","403","301","302","303","201","202","203","101","102","103","G1","G2","G3"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Expense category icon mapping; unknown categories get default icon
const ICONS = [
  [/water/i, "💧"],
  [/watchman|security|guard/i, "👮"],
  [/power|electric|current/i, "⚡"],
  [/garbage|trash|waste/i, "🗑️"],
  [/lift|elevator/i, "🛗"],
  [/paint/i, "🎨"],
  [/repair|plumb/i, "🔧"],
  [/clean/i, "🧹"],
  [/festival|function/i, "🎉"],
];
function iconFor(name){
  for (const [re, ic] of ICONS){ if (re.test(name)) return ic; }
  return "💸";
}

function fmt(n){
  return "₹" + Math.round(n).toLocaleString("en-IN");
}

// ---------- CSV parsing ----------
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ','){ row.push(field); field = ""; }
      else if (c === '\n' || c === '\r'){
        if (field !== "" || row.length){ row.push(field); rows.push(row); row = []; field = ""; }
        if (c === '\r' && text[i+1] === '\n') i++;
      }
      else field += c;
    }
  }
  if (field !== "" || row.length){ row.push(field); rows.push(row); }
  return rows;
}

// ---------- Data model builder ----------
function buildModel(csvText){
  const rows = parseCSV(csvText);
  if (!rows.length) return null;
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = name => header.indexOf(name);
  const iCat = idx("category"), iSub = idx("subcategory"), iPrice = idx("price"),
        iDate = idx("date"), iNote = idx("note"), iTxn = idx("transaction");
  if (iCat < 0 || iPrice < 0 || iDate < 0 || iTxn < 0) return null;

  const model = {
    minDate: null, maxDate: null,
    flats: {},            // flat -> { months: { "2026-07": {m:0, w:0, other:0, due:0, hasM:false, hasW:false, partial:false} } }
    expenses: {},         // category -> total
    monthly: {},          // "2026-07" -> { income:{}, expense:{}, incTotal, expTotal }
    totalIncome: 0, totalExpense: 0,
    years: new Set(),
  };

  for (let r = 1; r < rows.length; r++){
    const row = rows[r];
    if (!row || row.length < header.length - 2) continue;
    const cat = (row[iCat] || "").trim();
    const sub = (row[iSub] || "").trim();
    const price = parseFloat((row[iPrice] || "0").replace(/[",]/g, "")) || 0;
    const date = (row[iDate] || "").trim();
    const note = iNote >= 0 ? (row[iNote] || "").trim() : "";
    const txn = (row[iTxn] || "").trim().toLowerCase();
    if (!date || !price) continue;

    const ym = date.slice(0, 7);           // "2026-07"
    const year = date.slice(0, 4);
    model.years.add(year);
    if (!model.minDate || date < model.minDate) model.minDate = date;
    if (!model.maxDate || date > model.maxDate) model.maxDate = date;

    if (!model.monthly[ym]) model.monthly[ym] = { income:{}, expense:{}, incTotal:0, expTotal:0 };
    const M = model.monthly[ym];

    const flatMatch = cat.match(/^flat[-\s]*(.+)$/i);

    if (txn === "income"){
      model.totalIncome += price;
      // income type: water vs maintenance vs other (from subcategory)
      let type = "Maintenance";
      if (/water/i.test(sub)) type = "Water";
      else if (/maintenance|partial/i.test(sub) || sub === "") type = "Maintenance";
      else type = sub.replace(/amount/ig, "").trim() || "Other";
      M.income[type] = (M.income[type] || 0) + price;
      M.incTotal += price;

      if (flatMatch){
        const flat = flatMatch[1].trim().toUpperCase();
        if (!model.flats[flat]) model.flats[flat] = { months: {} };
        if (!model.flats[flat].months[ym]) model.flats[flat].months[ym] = { m:0, w:0, others:{}, due:0, partial:false };
        const fm = model.flats[flat].months[ym];
        if (type === "Water"){ fm.w += price; }
        else if (type === "Maintenance"){
          fm.m += price;
          if (/partial/i.test(sub)) fm.partial = true;
          const dueMatch = note.match(/due\s*=?\s*([\d,]+)/i);
          if (dueMatch){ fm.due += parseFloat(dueMatch[1].replace(/,/g, "")) || 0; fm.partial = true; }
        } else {
          fm.others[type] = (fm.others[type] || 0) + price;
        }
      }
    } else if (txn === "expense"){
      model.totalExpense += price;
      const catName = cat.replace(/\s+$/,"") || "Other";
      const key = catName.replace(/\s*(bill|charges|salary)\s*$/i, "").trim() || catName;
      model.expenses[key] = (model.expenses[key] || 0) + price;
      M.expense[key] = (M.expense[key] || 0) + price;
      M.expTotal += price;
    }
  }
  return model;
}

// ---------- Renderers ----------
function monthLabel(ym){
  const [y, m] = ym.split("-");
  const names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return names[parseInt(m,10)-1] + " " + y;
}

function render(model){
  // Header date range
  const fmtD = d => {
    const [y,m,dd] = d.split("-");
    return parseInt(dd,10) + " " + MONTHS[parseInt(m,10)-1] + " " + y;
  };
  document.getElementById("dateRange").textContent =
    model.minDate === model.maxDate ? fmtD(model.minDate) : fmtD(model.minDate) + " – " + fmtD(model.maxDate);

  // Combine known + new flats (new ones appended at end)
  const csvFlats = Object.keys(model.flats);
  const allFlats = [...KNOWN_FLATS];
  csvFlats.forEach(f => { if (!allFlats.includes(f)) allFlats.push(f); });

  // Determine latest month with data
  const dataMonths = Object.keys(model.monthly).sort();
  const latestYM = dataMonths[dataMonths.length - 1];
  const year = latestYM ? latestYM.slice(0,4) : new Date().getFullYear().toString();

  // Flat widgets
  let counts = { paid:0, notpaid:0, due:0 };
  const fhEl = document.getElementById("flatHistory");
  fhEl.innerHTML = "";
  allFlats.forEach(flat => {
    const fdata = model.flats[flat];
    // Status based on latest data month, maintenance-based
    let status = "notpaid", tagText = "Not Paid";
    const latest = fdata && fdata.months[latestYM];
    if (latest){
      if (latest.m > 0 && latest.partial && latest.due > 0){ status = "due"; tagText = "Due " + fmt(latest.due); }
      else if (latest.m > 0){ status = "paid"; tagText = "Paid"; }
      else { status = "notpaid"; tagText = "Not Paid"; }
    }
    counts[status === "due" ? "due" : status === "paid" ? "paid" : "notpaid"]++;

    // Build 12 month rows for the latest year
    let rowsHtml = "";
    MONTHS.forEach((mn, i) => {
      const ym = year + "-" + String(i+1).padStart(2,"0");
      const md = fdata && fdata.months[ym];
      const isLatest = ym === latestYM;
      if (md){
        let vals = "";
        if (md.m > 0){
          vals += md.partial
            ? '<span class="part">M ' + fmt(md.m) + '*</span>'
            : '<span class="yes">M ' + fmt(md.m) + '</span>';
        } else {
          vals += '<span class="no">M ✗</span>';
        }
        if (md.w > 0) vals += '<span class="yes">W ' + fmt(md.w) + '</span>';
        else vals += '<span class="no">W ✗</span>';
        for (const [k,v] of Object.entries(md.others)){
          vals += '<span class="yes">' + k + ' ' + fmt(v) + '</span>';
        }
        rowsHtml += '<div class="fh-row' + (isLatest ? '' : ' hidden-month') + '"><span class="fh-month">' + mn + '</span><span class="fh-vals">' + vals + '</span></div>';
      } else if (isLatest){
        // Latest month, flat has no data => Not paid row, always visible
        rowsHtml += '<div class="fh-row"><span class="fh-month">' + mn + '</span><span class="fh-vals"><span class="no">M ✗</span><span class="no">W ✗</span></span></div>';
      } else {
        rowsHtml += '<div class="fh-row nodata hidden-month"><span class="fh-month">' + mn + '</span><span class="fh-vals"><span>–</span></span></div>';
      }
    });

    const cardEl = document.createElement("div");
    cardEl.className = "fh-card";
    cardEl.onclick = function(){ this.classList.toggle("expanded"); };
    cardEl.innerHTML =
      '<div class="fh-header">Flat ' + flat +
      ' <span><span class="fh-tag ' + status + '">' + tagText + '</span><span class="fh-chevron">▼</span></span></div>' +
      rowsHtml;
    fhEl.appendChild(cardEl);
  });

  document.getElementById("flatLegend").innerHTML =
    '<span><i class="dot green"></i>Paid (' + counts.paid + ')</span>' +
    '<span><i class="dot orange"></i>Not Paid (' + counts.notpaid + ')</span>' +
    '<span><i class="dot amber"></i>Due (' + counts.due + ')</span>';

  // Expenses (dynamic categories, sorted desc)
  const expEl = document.getElementById("expensesList");
  expEl.innerHTML = "";
  const expEntries = Object.entries(model.expenses).sort((a,b) => b[1]-a[1]);
  const maxExp = expEntries.length ? expEntries[0][1] : 1;
  if (!expEntries.length) expEl.innerHTML = '<div class="empty-note">No expenses in this CSV</div>';
  expEntries.forEach(([name, amt]) => {
    const pct = Math.max(6, Math.round(amt / maxExp * 100));
    const div = document.createElement("div");
    div.className = "expense-row";
    div.innerHTML =
      '<div class="expense-icon">' + iconFor(name) + '</div>' +
      '<div class="expense-info"><div class="expense-name">' + name + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div>' +
      '<div class="expense-amt">' + fmt(amt) + '</div>';
    expEl.appendChild(div);
  });

  // Month-wise summary (only months with data; dynamic income/expense categories)
  const mcEl = document.getElementById("monthCards");
  mcEl.innerHTML = "";
  dataMonths.forEach(ym => {
    const M = model.monthly[ym];
    let html = '<div class="month-name">' + monthLabel(ym) + '</div>';
    if (M.incTotal > 0){
      html += '<div class="row inc"><span class="lbl">Income</span><span class="val">' + fmt(M.incTotal) + '</span></div>';
      Object.entries(M.income).sort((a,b)=>b[1]-a[1]).forEach(([t,v]) => {
        html += '<div class="row sub inc-sub"><span class="lbl">↳ ' + t + '</span><span class="val">' + fmt(v) + '</span></div>';
      });
    }
    if (M.expTotal > 0){
      html += '<div class="row exp"><span class="lbl">Expense</span><span class="val">' + fmt(M.expTotal) + '</span></div>';
      Object.entries(M.expense).sort((a,b)=>b[1]-a[1]).forEach(([t,v]) => {
        html += '<div class="row sub exp-sub"><span class="lbl">↳ ' + t + '</span><span class="val">' + fmt(v) + '</span></div>';
      });
    }
    const net = M.incTotal - M.expTotal;
    html += '<div class="row net"><span class="lbl">Net</span><span class="val">' + (net < 0 ? "-" + fmt(-net) : fmt(net)) + '</span></div>';
    const div = document.createElement("div");
    div.className = "month-card";
    div.innerHTML = html;
    mcEl.appendChild(div);
  });

  // Combined strip (only if >1 month)
  const mtEl = document.getElementById("monthTotal");
  if (dataMonths.length > 1){
    const labels = dataMonths.map(ym => MONTHS[parseInt(ym.split("-")[1],10)-1]).join(" + ");
    const net = model.totalIncome - model.totalExpense;
    mtEl.style.display = "flex";
    mtEl.innerHTML =
      '<span class="lbl">' + labels + ' Combined</span>' +
      '<span class="vals"><span class="inc">' + fmt(model.totalIncome) + '</span>' +
      '<span class="exp">' + fmt(model.totalExpense) + '</span>' +
      '<span class="net">' + (net < 0 ? "-" + fmt(-net) : fmt(net)) + '</span></span>';
  } else {
    mtEl.style.display = "none";
  }

  // Overall totals
  const net = model.totalIncome - model.totalExpense;
  document.getElementById("totIncome").textContent = fmt(model.totalIncome);
  document.getElementById("totExpense").textContent = fmt(model.totalExpense);
  document.getElementById("totNet").textContent = net < 0 ? "-" + fmt(-net) : fmt(net);
}

// ---------- File input ----------
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById("importStatus");
  status.textContent = "Loading " + file.name + "...";
  const reader = new FileReader();
  reader.onerror = function(){
    status.textContent = "File chadavaleka poyanu — malli try cheyandi";
  };
  reader.onload = function(ev){
    try{
      let text = ev.target.result;
      // strip BOM if present (Excel/Numbers exports)
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const model = buildModel(text);
      if (!model || (model.totalIncome === 0 && model.totalExpense === 0)){
        status.textContent = "CSV lo data kanapadaledu — Category/Price/Date/Transaction columns unnaya check cheyandi";
        return;
      }
      render(model);
      status.textContent = "✓ " + file.name + " loaded — " + new Date().toLocaleTimeString();
    } catch(err){
      status.textContent = "Error: " + err.message;
    }
  };
  reader.readAsText(file, "UTF-8");
});
