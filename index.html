<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKS M M Apartment — Monthly Account</title>
<style>
  body { margin:0; background:#F5F3EE; color:#26332B; font-family:'Segoe UI',system-ui,sans-serif; }
  .wrap { max-width:900px; margin:0 auto; padding:16px; }
  h1 { font-size:22px; margin:8px 0 2px; }
  .sub { color:#7A796F; font-size:13px; margin-bottom:16px; }
  .upload { display:block; border:2px dashed #2E7D4F; background:#E3F0E7; border-radius:12px;
    padding:26px 16px; text-align:center; cursor:pointer; margin-bottom:16px; }
  .upload .big { font-size:30px; } .upload .t { font-weight:700; margin-top:6px; }
  .upload .s { font-size:12px; color:#7A796F; margin-top:4px; }
  .err { background:#FBE6E6; color:#C23B3B; padding:10px; border-radius:8px; margin-bottom:12px; font-size:14px; display:none; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; font-size:13px; font-weight:600; }
  select, input[type=text] { padding:6px 10px; border-radius:8px; border:1px solid #D8D4C8; font-size:14px; }
  input[type=text] { width:110px; }
  .card { background:#fff; border-radius:12px; border:1px solid #D8D4C8; margin-bottom:16px; overflow:hidden; }
  .card .head { color:#fff; padding:8px 14px; font-weight:700; font-size:14px; }
  .card .body { padding:10px; overflow-x:auto; }
  table { border-collapse:collapse; width:100%; font-size:13px; }
  th, td { border:1px solid #D8D4C8; padding:6px 8px; text-align:left; }
  th { font-size:12px; }
  .r { text-align:right; font-variant-numeric:tabular-nums; }
  .bold { font-weight:700; } .note { font-size:12px; color:#7A796F; }
  .srow { display:flex; justify-content:space-between; padding:8px 6px; border-bottom:1px solid #D8D4C8; font-size:14px; }
  .srow.net { font-weight:800; font-size:16px; }
  .btns { display:flex; gap:10px; margin-bottom:30px; }
  .btns button { flex:1; padding:14px 0; font-size:15px; font-weight:700; color:#fff; border:none; border-radius:12px; cursor:pointer; }
  #btnXls { background:#2E7D4F; } #btnPdf { background:#2C5B8A; }
  #main { display:none; }
  /* print styles for PDF */
  @media print {
    body { background:#fff; }
    .upload, .controls, .btns, .err, .noprint { display:none !important; }
    .card { break-inside:avoid; border:1px solid #999; }
    .month-page { page-break-before:always; }
    .month-page:first-child { page-break-before:auto; }
    * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>SKS M M Apartment — Monthly Account</h1>
  <div class="sub">CSV upload చేయండి → check చేయండి → Excel / PDF export చేయండి</div>

  <label class="upload">
    <input type="file" id="file" accept=".csv" style="display:none">
    <div class="big">📄⬆️</div>
    <div class="t" id="upText">CSV file upload చేయడానికి ఇక్కడ tap చేయండి</div>
    <div class="s">Budget app export CSV (Ledger, Category, Price, Date, Transaction…)</div>
  </label>

  <div class="err" id="err"></div>

  <div id="main">
    <div class="controls noprint">
      <label>Month: <select id="monthSel"></select></label>
      <label>Opening Balance (first month starting amount): <input type="text" id="opening" value="0"></label>
    </div>
    <div id="report"></div>
    <div class="btns">
      <button id="btnXls">⬇️ Excel Export</button>
      <button id="btnPdf">🖨️ PDF (Print)</button>
    </div>
  </div>
</div>

<script>
"use strict";
// ---------- CSV parsing (handles quoted commas) ----------
function parseCSV(text) {
  const rows = []; let row = [], cur = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) {
      if (ch === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ',') { row.push(cur); cur = ""; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cur); cur = "";
        if (row.some(c => c.trim() !== "")) rows.push(row);
        row = [];
      } else cur += ch;
    }
  }
  row.push(cur);
  if (row.some(c => c.trim() !== "")) rows.push(row);
  if (!rows.length) return [];
  const hdr = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => { const o = {}; hdr.forEach((h,i) => o[h] = (r[i] || "").trim()); return o; });
}

const parsePrice = v => parseFloat(String(v||"").replace(/,/g,"")) || 0;
const monthKey = d => (d||"").slice(0,7);
function monthLabel(k){ if(!k) return ""; const [y,m]=k.split("-");
  return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+y; }
const inr = n => (n==null||n==="") ? "" : "₹"+Number(n).toLocaleString("en-IN");
const signed = n => (n<0?"−":"")+inr(Math.abs(n));
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function classifyIncome(sub){ const t=(sub||"").trim();
  if(/water/i.test(t)) return "Water Bill";
  if(t===""||/maint|partial/i.test(t)) return "Maintenance";
  return t.replace(/\s+/g," ").replace(/\b\w/g,c=>c.toUpperCase()); }
function orderCols(cols){ const base=["Maintenance","Water Bill"];
  const extra=cols.filter(c=>!base.includes(c)).sort();
  return [...base.filter(c=>cols.includes(c)),...extra]; }
function sortFlats(list){ return [...list].sort((a,b)=>{
  const ka=a.replace(/^Flat-/i,""), kb=b.replace(/^Flat-/i,"");
  const ga=/^G/i.test(ka), gb=/^G/i.test(kb);
  if(ga&&!gb) return -1; if(!ga&&gb) return 1;
  return ka.localeCompare(kb,undefined,{numeric:true}); }); }

// ---------- state ----------
let rows = null, months = [], flatList = [];

function buildReport(mKey){
  const mRows = rows.filter(r => monthKey(r.Date) === mKey);
  const income = {}; flatList.forEach(f => income[f] = {cols:{}, notes:[]});
  const expenses = []; const colSet = new Set();
  mRows.forEach(r => {
    const cat=(r.Category||"").trim(), sub=(r.Subcategory||"").trim();
    const amt=parsePrice(r.Price), note=(r.Note||"").trim();
    const isIncome=(r.Transaction||"").trim()==="Income";
    if(isIncome && /^Flat-/i.test(cat)){
      if(!income[cat]) income[cat]={cols:{},notes:[]};
      const col=classifyIncome(sub); colSet.add(col);
      income[cat].cols[col]=(income[cat].cols[col]||0)+amt;
      if(note) income[cat].notes.push(note);
      if(/partial/i.test(sub)) income[cat].notes.push(sub);
    } else if(!isIncome){
      expenses.push({item:cat, detail:sub, date:r.Date, amt});
    }
  });
  if(!colSet.size) colSet.add("Maintenance");
  const columns=orderCols([...colSet]);
  const colTotals={}; columns.forEach(c=>{
    colTotals[c]=Object.values(income).reduce((s,f)=>s+(f.cols[c]||0),0); });
  const totalIncome=Object.values(colTotals).reduce((a,b)=>a+b,0);
  return { income, columns, colTotals, expenses, totalIncome,
    flatTotal: f => Object.values(income[f].cols).reduce((a,b)=>a+b,0),
    totalExpense: expenses.reduce((s,e)=>s+e.amt,0) };
}

function chainedOpeningFor(mKey){
  let op = parsePrice(document.getElementById("opening").value);
  for(const k of months){ if(k===mKey) return op;
    const rep=buildReport(k); op = op + rep.totalIncome - rep.totalExpense; }
  return op;
}

// ---------- render one month block ----------
function monthBlock(mKey, op, forPrint){
  const rep = buildReport(mKey);
  const label = monthLabel(mKey);
  const net = op + rep.totalIncome - rep.totalExpense;
  const cols = rep.columns;

  let h = '<div class="month-page">';
  h += '<div style="background:#305496;color:#fff;font-weight:bold;font-size:16px;text-align:center;padding:8px;border-radius:6px;margin-bottom:10px;">SKS M M Apartment — '+esc(label)+' (Monthly Account)</div>';

  h += '<div class="card"><div class="head" style="background:#2E7D4F;">INCOME — Flat Wise ('+flatList.length+' Flats)</div><div class="body"><table>';
  h += '<tr>'+['Flat',...cols,'Total','Note'].map(c=>'<th style="background:#E2EFDA;">'+esc(c)+'</th>').join('')+'</tr>';
  flatList.forEach(f=>{
    const d=rep.income[f], tot=rep.flatTotal(f);
    h += '<tr><td>'+esc(f)+'</td>'
      + cols.map(c=>'<td class="r">'+(d.cols[c]>0?inr(d.cols[c]):"")+'</td>').join('')
      + '<td class="r bold">'+(tot>0?inr(tot):"")+'</td>'
      + '<td class="note">'+esc(d.notes.join("; "))+'</td></tr>';
  });
  h += '<tr style="background:#C6E0B4;font-weight:700;"><td>TOTAL INCOME</td>'
    + cols.map(c=>'<td class="r">'+inr(rep.colTotals[c])+'</td>').join('')
    + '<td class="r">'+inr(rep.totalIncome)+'</td><td></td></tr>';
  h += '</table></div></div>';

  h += '<div class="card"><div class="head" style="background:#B05E27;">EXPENSES</div><div class="body"><table>';
  h += '<tr>'+['Item','Details','Date','Amount'].map(c=>'<th style="background:#FCE4D6;">'+c+'</th>').join('')+'</tr>';
  rep.expenses.forEach(e=>{
    h += '<tr><td>'+esc(e.item)+'</td><td class="note">'+esc(e.detail)+'</td><td class="note">'+esc(e.date)+'</td><td class="r">'+inr(e.amt)+'</td></tr>';
  });
  h += '<tr style="background:#F8CBAD;font-weight:700;"><td colspan="3">TOTAL EXPENSES</td><td class="r">'+inr(rep.totalExpense)+'</td></tr>';
  h += '</table></div></div>';

  h += '<div class="card"><div class="head" style="background:#2C5B8A;">MONTH SUMMARY — '+esc(label)+'</div><div class="body">';
  h += '<div class="srow" style="background:#EFEFEF;"><span class="bold">Opening Balance (Carry Forward)</span><span class="bold" style="color:'+(op<0?'#C23B3B':'#26332B')+';">'+signed(op)+'</span></div>';
  h += '<div class="srow"><span style="color:#2E7D4F;font-weight:700;">Total Income (+)</span><span style="color:#2E7D4F;font-weight:700;">'+inr(rep.totalIncome)+'</span></div>';
  h += '<div class="srow"><span style="color:#C23B3B;font-weight:700;">Total Expenses (−)</span><span style="color:#C23B3B;font-weight:700;">−'+inr(rep.totalExpense)+'</span></div>';
  h += '<div class="srow net" style="background:#FFE699;"><span>Net Balance → next month carry forward</span><span style="color:'+(net<0?'#C23B3B':'#2E7D4F')+';">'+signed(net)+'</span></div>';
  h += '</div></div></div>';
  return { html:h, net, rep };
}

function render(){
  const sel = document.getElementById("monthSel");
  const mKey = sel.value;
  const op = chainedOpeningFor(mKey);
  document.getElementById("report").innerHTML = monthBlock(mKey, op).html;
}

// ---------- file handling ----------
document.getElementById("file").addEventListener("change", function(){
  const f = this.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = parseCSV(reader.result).filter(r => r.Date && r.Price);
      if(!data.length){ showErr("CSV లో data కనబడలేదు. Date, Price, Transaction columns ఉన్నాయో check చేయండి."); return; }
      rows = data;
      months = [...new Set(data.map(r=>monthKey(r.Date)))].sort();
      flatList = sortFlats([...new Set(data
        .filter(r=>(r.Transaction||"").trim()==="Income" && /^Flat-/i.test((r.Category||"").trim()))
        .map(r=>r.Category.trim()))]);
      const sel = document.getElementById("monthSel");
      sel.innerHTML = months.map(m=>'<option value="'+m+'">'+monthLabel(m)+'</option>').join('');
      sel.value = months[months.length-1];
      document.getElementById("upText").textContent = "Loaded: "+f.name+" — మళ్ళీ upload చేయడానికి tap చేయండి";
      document.getElementById("main").style.display = "block";
      hideErr(); render();
    } catch(e){ showErr("Error: "+e.message); }
  };
  reader.readAsText(f);
});
document.getElementById("monthSel").addEventListener("change", render);
document.getElementById("opening").addEventListener("input", render);
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }
function hideErr(){ document.getElementById("err").style.display="none"; }

// ---------- Excel export (SpreadsheetML with styles) ----------
document.getElementById("btnXls").addEventListener("click", function(){
  try {
    let op = parsePrice(document.getElementById("opening").value);
    let sheets = "";
    const B = '<Borders><Border ss:Position="Left" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#999999"/><Border ss:Position="Right" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#999999"/><Border ss:Position="Top" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#999999"/><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#999999"/></Borders>';
    const NF = '<NumberFormat ss:Format="#,##0"/>';
    const cell = (v,st,n) => (v===""||v==null) ? '<Cell ss:StyleID="'+st+'"/>' :
      '<Cell ss:StyleID="'+st+'"><Data ss:Type="'+(n?"Number":"String")+'">'+esc(v)+'</Data></Cell>';
    const R_ = (cells,h) => '<Row'+(h?' ss:Height="'+h+'"':'')+'>'+cells.join('')+'</Row>';

    months.forEach(mKey=>{
      const rep = buildReport(mKey), label = monthLabel(mKey), cols = rep.columns;
      const w = cols.length + 2;
      const R = [];
      R.push(R_(['<Cell ss:MergeAcross="'+w+'" ss:StyleID="title"><Data ss:Type="String">SKS M M Apartment — '+esc(label)+' (Monthly Account)</Data></Cell>'],26));
      R.push(R_([cell("","plain")]));
      R.push(R_(['<Cell ss:MergeAcross="'+w+'" ss:StyleID="hInc"><Data ss:Type="String">INCOME — Flat Wise ('+flatList.length+' Flats)</Data></Cell>']));
      R.push(R_([cell("Flat","thInc"),...cols.map(c=>cell(c+" (₹)","thInc")),cell("Total (₹)","thInc"),cell("Note","thInc")]));
      flatList.forEach(f=>{
        const d=rep.income[f], tot=rep.flatTotal(f);
        R.push(R_([cell(f,"b"),...cols.map(c=>cell(d.cols[c]>0?d.cols[c]:"","num",true)),
          cell(tot>0?tot:"","numB",true),cell(d.notes.join("; "),"note")]));
      });
      R.push(R_([cell("TOTAL INCOME","totInc"),...cols.map(c=>cell(rep.colTotals[c],"totIncN",true)),
        cell(rep.totalIncome,"totIncN",true),cell("","totInc")]));
      R.push(R_([cell("","plain")]));
      R.push(R_(['<Cell ss:MergeAcross="'+w+'" ss:StyleID="hExp"><Data ss:Type="String">EXPENSES</Data></Cell>']));
      R.push(R_([cell("Item","thExp"),cell("Details","thExp"),cell("Date","thExp"),cell("Amount (₹)","thExp")]));
      rep.expenses.forEach(e=>{
        R.push(R_([cell(e.item,"b"),cell(e.detail,"b"),cell(e.date,"b"),cell(e.amt,"num",true)]));
      });
      R.push(R_([cell("TOTAL EXPENSES","totExp"),cell("","totExp"),cell("","totExp"),cell(rep.totalExpense,"totExpN",true)]));
      R.push(R_([cell("","plain")]));
      const net = op + rep.totalIncome - rep.totalExpense;
      R.push(R_(['<Cell ss:MergeAcross="'+w+'" ss:StyleID="hSum"><Data ss:Type="String">MONTH SUMMARY — '+esc(label)+'</Data></Cell>']));
      R.push(R_(['<Cell ss:MergeAcross="2" ss:StyleID="sGrey"><Data ss:Type="String">Opening Balance (Carry Forward)</Data></Cell>'+cell(op,"sGreyN",true)]));
      R.push(R_(['<Cell ss:MergeAcross="2" ss:StyleID="sInc"><Data ss:Type="String">Total Income (+)</Data></Cell>'+cell(rep.totalIncome,"sIncN",true)]));
      R.push(R_(['<Cell ss:MergeAcross="2" ss:StyleID="sExp"><Data ss:Type="String">Total Expenses (−)</Data></Cell>'+cell(rep.totalExpense,"sExpN",true)]));
      R.push(R_(['<Cell ss:MergeAcross="2" ss:StyleID="sNet"><Data ss:Type="String">Net Balance → next month carry forward</Data></Cell>'+cell(net,"sNetN",true)]));
      const colXml = '<Column ss:Width="150"/>'+cols.map(()=>'<Column ss:Width="105"/>').join('')+'<Column ss:Width="90"/><Column ss:Width="190"/>';
      sheets += '<Worksheet ss:Name="'+esc(label.replace(" ","_"))+'"><Table>'+colXml+R.join("\n")+'</Table></Worksheet>';
      op = net;
    });

    const xml = '<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n'
      + '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">'
      + '<Styles>'
      + '<Style ss:ID="plain"/>'
      + '<Style ss:ID="title"><Font ss:Bold="1" ss:Size="14" ss:Color="#FFFFFF"/><Interior ss:Color="#305496" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center" ss:Vertical="Center"/></Style>'
      + '<Style ss:ID="hInc"><Font ss:Bold="1" ss:Size="12"/><Interior ss:Color="#C6E0B4" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/>'+B+'</Style>'
      + '<Style ss:ID="thInc"><Font ss:Bold="1"/><Interior ss:Color="#E2EFDA" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/>'+B+'</Style>'
      + '<Style ss:ID="b">'+B+'</Style>'
      + '<Style ss:ID="note"><Font ss:Size="9" ss:Color="#666666"/>'+B+'</Style>'
      + '<Style ss:ID="num"><Font ss:Color="#0000FF"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="numB"><Font ss:Bold="1"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="totInc"><Font ss:Bold="1"/><Interior ss:Color="#C6E0B4" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="totIncN"><Font ss:Bold="1"/><Interior ss:Color="#C6E0B4" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="hExp"><Font ss:Bold="1" ss:Size="12"/><Interior ss:Color="#F8CBAD" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/>'+B+'</Style>'
      + '<Style ss:ID="thExp"><Font ss:Bold="1"/><Interior ss:Color="#FCE4D6" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/>'+B+'</Style>'
      + '<Style ss:ID="totExp"><Font ss:Bold="1"/><Interior ss:Color="#F8CBAD" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="totExpN"><Font ss:Bold="1"/><Interior ss:Color="#F8CBAD" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="hSum"><Font ss:Bold="1" ss:Size="12"/><Interior ss:Color="#BDD7EE" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/>'+B+'</Style>'
      + '<Style ss:ID="sGrey"><Font ss:Bold="1"/><Interior ss:Color="#D9D9D9" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="sGreyN"><Font ss:Bold="1"/><Interior ss:Color="#D9D9D9" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="sInc"><Font ss:Bold="1" ss:Color="#2E7D4F"/><Interior ss:Color="#C6E0B4" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="sIncN"><Font ss:Bold="1" ss:Color="#2E7D4F"/><Interior ss:Color="#C6E0B4" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="sExp"><Font ss:Bold="1" ss:Color="#C23B3B"/><Interior ss:Color="#F8CBAD" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="sExpN"><Font ss:Bold="1" ss:Color="#C23B3B"/><Interior ss:Color="#F8CBAD" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '<Style ss:ID="sNet"><Font ss:Bold="1" ss:Size="12"/><Interior ss:Color="#FFE699" ss:Pattern="Solid"/>'+B+'</Style>'
      + '<Style ss:ID="sNetN"><Font ss:Bold="1" ss:Size="12"/><Interior ss:Color="#FFE699" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/>'+B+NF+'</Style>'
      + '</Styles>' + sheets + '</Workbook>';

    const blob = new Blob([xml], {type:"application/vnd.ms-excel"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const range = months.length>1 ? months[0]+"_to_"+months[months.length-1] : months[0];
    a.href = url; a.download = "SKS_MM_Apartment_"+range+".xls";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  } catch(e){ showErr("Export error: "+e.message); }
});

// ---------- PDF: render ALL months, then print ----------
document.getElementById("btnPdf").addEventListener("click", function(){
  let op = parsePrice(document.getElementById("opening").value);
  let all = "";
  months.forEach(mKey=>{
    const blk = monthBlock(mKey, op, true);
    all += blk.html; op = blk.net;
  });
  const rpt = document.getElementById("report");
  const backup = rpt.innerHTML;
  rpt.innerHTML = all;
  window.print();
  rpt.innerHTML = backup;
});
</script>
</body>
</html>
